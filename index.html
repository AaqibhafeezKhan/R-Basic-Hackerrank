<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R-Basic Solutions Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-r.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside>
            <div class="logo-container">
                <div class="logo-icon">
                    <i data-lucide="bar-chart-3" color="white"></i>
                </div>
                <h2 style="font-size: 1.25rem;">R-Basic</h2>
            </div>
            <div style="position: relative;">
                <input type="text" id="challenge-search" placeholder="Search challenges...">
                <i data-lucide="search" size="14" style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary);"></i>
            </div>
            <div>
                <p style="font-size: 0.65rem; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 700; letter-spacing: 0.5px;">COLLECTION</p>
                <div id="challenge-list" class="challenge-list">
                </div>
            </div>
            <div style="margin-top: auto;">
                <a href="https://github.com/AaqibhafeezKhan/R-Basic-Hackerrank" target="_blank" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem;">
                    <i data-lucide="github" size="16"></i>
                    View Source
                </a>
            </div>
        </aside>
        <main id="app-main">
            <div id="welcome-screen">
                <div class="header-section">
                    <div class="title-badge">Overview</div>
                    <h1>R-Basic Solutions</h1>
                    <p style="color: var(--text-secondary); margin-top: 1rem; max-width: 600px; line-height: 1.6;">
                        Select a challenge from the sidebar to view the requirements and solutions.
                    </p>
                </div>
                <div class="github-stats">
                    <div class="stat-card">
                        <p>Total Challenges</p>
                        <h4 id="stat-challenges">3</h4>
                    </div>
                    <div class="stat-card">
                        <p>Status</p>
                        <h4>Complete</h4>
                    </div>
                </div>
            </div>
            <div id="challenge-view" style="display: none;">
                <div class="header-section">
                    <div id="current-badge" class="title-badge">Category</div>
                    <h1 id="current-title">Challenge Title</h1>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); margin-bottom: 2rem;">
                    <div class="tabs">
                        <div class="tab active" onclick="switchTab('question')">Question</div>
                        <div class="tab" onclick="switchTab('solution')">Solution</div>
                    </div>
                    <div id="code-actions" style="display: none; gap: 0.5rem; padding-bottom: 0.5rem;">
                        <button onclick="copyCode()" class="action-btn" title="Copy Code">
                            <i data-lucide="copy" size="14"></i>
                        </button>
                        <button onclick="downloadSolution()" class="action-btn" title="Download .R">
                            <i data-lucide="download" size="14"></i>
                        </button>
                    </div>
                </div>
                <div id="content-display" class="markdown-body">
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
